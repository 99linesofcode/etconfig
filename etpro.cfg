    seta b_althud "0"                                   // default: "0"                             hud layout. use 0, 1, 2 or 3
    seta b_althudflags "2"                              // default: "0"                             bitmask for various hud settings. 1: move round timer, 2: hide rank, 4: move messages
    seta b_antilag "1"                                  // default: "1"                             toggles whether or not shots are lag-compensated by the server
    seta b_backupcvars "0"                              // default: "0"                             toggles whether or not backup files are made when etpro cvar_restrictions are applied
    seta b_chatalpha "0.33"                             // default: "0.33"                          defines the alpha of chat text, anything between 0 and 1 is a valid setting
    seta b_chatflags "1"                                // default: "1"                             when set to 1 , team flags are drawn next to each chat message
    seta b_chatsounds "0"                               // default: "0"                             toggle the use of chat sounds
    seta b_cmdwarnings "1"                              // default: "1"                             enables / disables notifications from the tjl_* commands
    seta b_debuglocations "0"                           // default: "0"
    seta b_demo_autotimescale "1"                       // default: "1"                             timescale to switch to when a weapon set in b_demo_autotimescaleweapons is fired
    seta b_demo_autotimescaleweapons "0"                // default: "0"                             automatically change the timescale when a certain type of weapon are fired, 1: panzerfaust, 2: grenade, 4: dynamite, 8: mortar, 16: smoke grenades and airstrike markers
    seta b_demo_dynamitecounter "0"                     // default: "0"                             draws a floating counter above armed dynamite during demo playback and when spectating as a shoutcaster
    seta b_demo_followxdistance "50"                    // default: "50"                            x camera offset when attached to a weapon
    seta b_demo_followydistance "0"                     // default: "0"                             y camera offset when attached to a weapon
    seta b_demo_followzdistance "20"                    // default: "20"                            z camera offset when attached to a weapon
    seta b_demo_freecamspeed "800"                      // default: "800"                           controls the speed of freecam movement (spectator)
    seta b_demo_lookat "-1"                             // default: "-1"                            causes the freecam to lock its view on the specified player -1 disables this
    seta b_demo_dynamitecam "0"                         // default: "0"                             attach the camera to this type of weapon during demo playback
    seta b_demo_genadecam "0"                           // default: "0"                             attach the camera to this type of weapon during demo playback
    seta b_demo_mortarcam "0"                           // default: "0"                             attach the camera to this type of weapon during demo playback
    seta b_demo_panzercam "0"                           // default: "0"                             attach the camera to this type of weapon during demo playback
    seta b_demo_nametags "0"                            // default: "0"                             controls how floating names above each player are drawn during demo playback and when spectating as a shoutcaster, 1: draw visible players, 2: draw all players, 4: draw the player's client number, 8: draw the player's class
    seta b_demo_nopitch "1"                             // default: "1"                             when set to 1, the camera doesn't pitch while its attached to weapons
    seta b_demo_pitchturnspeed "140"                    // default: "140"                           defines the speed while using +freecam commands
    seta b_demo_playersprites "1"                       // default: "1"                             controls whether the floating sprites are drawn over players' heads in demo playback
    seta b_demo_pvhint "0"                              // default: "0"                             draws a line from the freecam origin to the origin of the demo recorder
    seta b_demo_rollspeed "140"                         // default: "140"                           defines the speed while using the +freecam_* commands
    seta b_demo_teamonlymissilecam "0"                  // default: "0"                             only attach the camera to weapons fired by your own team
    seta b_descriptivetextscale "0.8"                   // default: "0.8"                           scales the limbo hud text
    seta b_drawclock "1"                                // default: "0"                             when set to 1 displays a clock with your local time drawn on the hud
    seta b_drawpromotions "1"                           // default: "0"                             controls whether the "promoted to rank <rank>" messages are shown
    seta b_drawranks "1"                                // default: "1"                             when set to 1, the ranks of other players are drawn when using cg_crosshairnames
    seta b_drawrewards "1"                              // default: "1"                             controls whether skill level increase and reward messages are shown
    seta b_drawspectatoralpha "1.0"                     // default: "1.0"                           defines the alpha of the "spectator", "shoutcaster", "freecam", etc. notices
    seta b_drawspectatorteamflags "1"                   // default: "1"                             draw a small team flag near the player name when following players in spectator mode
    seta b_drawspeed "0"                                // default: "0"                             draws a speedometer on the hud, valid values: 0, 1, 2, 3, 4, 5
    seta b_fireteamalpha "1"                            // default: "1"                             defines the alpha of the fireteam overlay
    seta b_fireteamlatchedclass "0"                     // default: "0"                             toggle display of latched playerclass instead of rank in the fireteam hud display
    seta b_goatsound "1"                                // default: "1"                             enables the osp goat sound upon a knife kill
    seta b_hitsounds "1"                                // default: "1"
    seta b_hudyoffset "10.0"                            // default: "10"                            moves the hud up so it is out of the way of the demo status line
    seta b_lagometeralpha "1"                           // default: "1"
    seta b_locationjustify "0"                          // default: "0"                             alignment of location names in fireteam hud table, -1: left padding, 0: left, 1: right padding
    seta b_locationmaxchars "25"                        // default: "25"                            max number of characters for location name in the fireteam hud table
    seta b_locationmode "0"                             // default: "0"                             controls how locations are displayed
    seta b_logbanners "1"                               // default: "1"                             force logging of server banners to the console
    seta b_mapzoom "5.159"                              // default: "5.159"                         zoom level for map shown in compass
    seta b_muzzleflash "0"                              // default: "1"                             when set to 1, draws muzzleflash while shooting
    seta b_noactivatelean "0"                           // default: "0"                             disables leaning behavior when strafing with +activate
    seta b_numpopups "-1"                               // default: "-1"                            controls the number of popup messages on the hud, -1: default, 0: disable popups, (number): number of popups
    seta b_optimizeprediction "1"                       // default: "1"                             attempt to use previously calculated prediction results when possible to increase performance
    seta b_panzerhack "1"                               // default: "1"                             if set to 1, the secondary main weapon for a soldier with level 4 heavy weapons is moved to weaponbank 2
    seta b_popupfadetime "1000"                         // default: "2500"
    seta b_popupstaytime "2000"                         // default: "2000"
    seta b_popuptime "1000"                             // default: "1000"
    seta b_predefineddemokeys "1"                       // default: "1"                             if this is set to 1, demo playback uses hard-coded key bindings, which cannot be overridden
    seta b_shovesounds "1"                              // default: "1"
    seta b_simpleitems "0"                              // default: "0"                             draw sprites instead of models for items for a slight performance/visibility increase, valid values: 0, 1
    seta b_speedinterval "100"                          // default: "100"                           the time in milliseconds between two speedometer updates
    seta b_speedunit "2"                                // default: "0"                             the speedunit used for the ups meter, valid values: 0 (ups), 1(mi/h), 2(km/h)
    seta b_textcolorfilter ""                           // default: ""                              strips certain color characters from most text messages
    seta b_tjg_ghostfx "2"                              // default: "2"
    seta b_tjl_draw "1"                                 // default: "1"
    seta b_tjl_color "green"                            // default: "green"
    seta b_tjl_quickslot "0"                            // default: "0"
    seta b_tjl_showmaxspeed "0"                         // default: "0"
    seta b_tjl_stepsize "0.5"                           // default: "0.5"
    seta b_tjl_stoponnomove "1"                         // default: "1"
    seta b_tracers "0"                                  // default: "1"                             enable/disable bullet tracers, valid values: 0: no tracers, 1: show all tracers, 2: don't show own tracers
    seta b_votetextscale "0.8"                          // default: "0.8"
    seta b_watermarkalpha "1"                           // default: "1"
    seta b_weapaltreloads "0"                           // default: "1"                             if set to 1 weapons lacking an alternative fire mode will automaticly reload when using the alternate fire mode
